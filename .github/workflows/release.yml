name: Release

# On every v* tag:
#   build  – Android: signed APK + AAB → GitHub Release, and → Play internal testing
#   ios    – iOS: signed IPA → TestFlight  (macOS runner; off until IOS.md is set up)
# Example:  git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required for the GitHub Release the job creates

jobs:
  build:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle (for Play Store)
        run: flutter build appbundle --release

      - name: Rename artifacts with the tag
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "YouCoursifyTube-${GITHUB_REF_NAME}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "YouCoursifyTube-${GITHUB_REF_NAME}.aab"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "YouCoursifyTube-${GITHUB_REF_NAME}.apk" \
            "YouCoursifyTube-${GITHUB_REF_NAME}.aab" \
            --title "You Coursify Tube ${GITHUB_REF_NAME}" \
            --generate-notes

      # Upload the AAB to Google Play's Internal testing track.
      # Inert until the PLAY_SERVICE_ACCOUNT_JSON secret is set (see PLAYSTORE.md),
      # so the GitHub Release above always succeeds even before Play is configured.
      # NOTE: the very first release for this package must be uploaded MANUALLY in
      # the Play Console once — the API rejects uploads until a build exists.
      - name: Upload to Google Play (internal testing)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.youcoursifytube.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  # iOS build + TestFlight upload. Runs on macOS (iOS can't build elsewhere).
  # Gated on the IOS_RELEASE_ENABLED repository variable so it stays off until
  # the Apple Developer setup is done — see IOS.md. Requires these secrets:
  #   APPSTORE_API_KEY_ID, APPSTORE_API_ISSUER_ID, APPSTORE_API_PRIVATE_KEY, APPLE_TEAM_ID
  ios:
    name: Build & upload iOS to TestFlight
    runs-on: macos-latest
    if: ${{ vars.IOS_RELEASE_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"

      - name: Generate ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app -t ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
